<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0a0f">
<title>OceanChat</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
  :root {
    --bg:#0a0a0f; --surface:#13131a; --border:#1e1e2e;
    --wave:#4f8ef7; --wave-dim:#1e3a6e; --pulse:#00e5ff;
    --text:#e8e8f0; --text-dim:#6b6b8a;
    --online:#00e676; --danger:#ff4757; --radius:14px;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;overflow:hidden}
  #splash{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);gap:24px;z-index:100;transition:opacity .5s}
  #splash.hidden{opacity:0;pointer-events:none}
  .ocean-icon{width:80px;height:80px;position:relative}
  .ocean-ring{position:absolute;inset:0;border-radius:50%;border:2px solid var(--wave);animation:ripple 2s ease-out infinite}
  .ocean-ring:nth-child(2){animation-delay:.6s}
  .ocean-ring:nth-child(3){animation-delay:1.2s}
  .ocean-core{position:absolute;inset:24px;background:var(--wave);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px}
  @keyframes ripple{0%{transform:scale(.6);opacity:1}100%{transform:scale(1.8);opacity:0}}
  .splash-title{font-size:28px;font-weight:600}
  .splash-title span{color:var(--wave)}
  .splash-sub{font-size:13px;color:var(--text-dim);text-align:center;max-width:260px;line-height:1.6}
  .btn{padding:12px 28px;border-radius:50px;border:none;cursor:pointer;font-family:inherit;font-size:14px;font-weight:500;transition:all .2s}
  .btn-primary{background:var(--wave);color:#fff}
  .btn-primary:hover{filter:brightness(1.15)}
  .btn-ghost{background:transparent;color:var(--text-dim);border:1px solid var(--border)}
  .btn-ghost:hover{border-color:var(--wave);color:var(--wave)}
  .my-id-box{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 18px;text-align:center;width:100%;max-width:300px}
  .my-id-label{font-size:11px;color:var(--text-dim);margin-bottom:6px;letter-spacing:1px;text-transform:uppercase}
  .my-id-value{font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:500;color:var(--pulse);letter-spacing:3px}
  .my-id-hint{font-size:11px;color:var(--text-dim);margin-top:6px}
  #app{display:none;flex-direction:column;height:100vh}
  #app.visible{display:flex}
  .app-header{display:flex;align-items:center;padding:14px 16px;background:var(--surface);border-bottom:1px solid var(--border);gap:12px}
  .peer-avatar{width:38px;height:38px;border-radius:50%;background:var(--wave-dim);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:600;color:var(--wave);flex-shrink:0}
  .peer-info{flex:1;min-width:0}
  .peer-name{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .peer-status{font-size:11px;color:var(--text-dim);display:flex;align-items:center;gap:5px;margin-top:2px}
  .status-dot{width:7px;height:7px;border-radius:50%;background:var(--text-dim);transition:background .3s}
  .status-dot.online{background:var(--online);box-shadow:0 0 6px var(--online)}
  .icon-btn{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--text-dim)}
  #messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px;scroll-behavior:smooth}
  .msg-row{display:flex;align-items:flex-end;gap:8px}
  .msg-row.mine{flex-direction:row-reverse}
  .msg-bubble{max-width:75%;padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.5;word-break:break-word}
  .msg-row.mine .msg-bubble{background:var(--wave);color:#fff;border-bottom-right-radius:4px}
  .msg-row.theirs .msg-bubble{background:var(--surface);border:1px solid var(--border);color:var(--text);border-bottom-left-radius:4px}
  .msg-time{font-size:10px;color:var(--text-dim);margin-bottom:4px;padding:0 4px}
  .system-msg{text-align:center;font-size:11px;color:var(--text-dim);padding:6px 12px;background:var(--surface);border-radius:20px;margin:4px auto;max-width:280px}
  .input-area{padding:12px 16px;background:var(--surface);border-top:1px solid var(--border);display:flex;gap:10px;align-items:flex-end}
  #msgInput{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:22px;padding:10px 16px;color:var(--text);font-family:inherit;font-size:14px;resize:none;max-height:120px;outline:none;transition:border-color .2s;line-height:1.4}
  #msgInput:focus{border-color:var(--wave)}
  #msgInput::placeholder{color:var(--text-dim)}
  .send-btn{width:42px;height:42px;border-radius:50%;background:var(--wave);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;transition:all .2s}
  .send-btn:disabled{background:var(--wave-dim);cursor:not-allowed}
  #connectModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:200;align-items:center;justify-content:center;padding:20px}
  #connectModal.visible{display:flex}
  .modal-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:28px 24px;width:100%;max-width:340px;display:flex;flex-direction:column;gap:16px}
  .modal-title{font-size:18px;font-weight:600}
  .modal-sub{font-size:13px;color:var(--text-dim);line-height:1.5}
  .input-field{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:18px;letter-spacing:3px;text-align:center;outline:none;width:100%;text-transform:uppercase}
  .input-field:focus{border-color:var(--wave)}
  .modal-actions{display:flex;gap:10px}
  .modal-actions .btn{flex:1}
  .waiting-indicator{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-dim);justify-content:center}
  .waiting-dot{width:6px;height:6px;border-radius:50%;background:var(--wave);animation:blink 1.4s ease-in-out infinite}
  .waiting-dot:nth-child(2){animation-delay:.2s}
  .waiting-dot:nth-child(3){animation-delay:.4s}
  @keyframes blink{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}
  #status-bar{position:fixed;bottom:0;left:0;right:0;text-align:center;font-size:11px;color:var(--text-dim);padding:4px;background:var(--surface);border-top:1px solid var(--border)}
</style>
</head>
<body>

<div id="splash">
  <div class="ocean-icon">
    <div class="ocean-ring"></div>
    <div class="ocean-ring"></div>
    <div class="ocean-ring"></div>
    <div class="ocean-core">🌊</div>
  </div>
  <div class="splash-title">Ocean<span>Chat</span></div>
  <div class="splash-sub">Mesaje directe, fără server.<br>Prin energia din jurul tău.</div>
  <div class="my-id-box">
    <div class="my-id-label">ID-ul tău</div>
    <div class="my-id-value" id="myIdDisplay">...</div>
    <div class="my-id-hint">Dă-l celui cu care vrei să vorbești</div>
  </div>
  <button class="btn btn-primary" onclick="openConnectModal()">Conectează-te</button>
  <button class="btn btn-ghost" onclick="showWaiting()">Așteaptă conexiune</button>
</div>

<div id="app">
  <div class="app-header">
    <div class="peer-avatar" id="peerAvatar">?</div>
    <div class="peer-info">
      <div class="peer-name" id="peerName">--</div>
      <div class="peer-status">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusText">Se conectează...</span>
      </div>
    </div>
    <button class="icon-btn" onclick="toggleDebug()" title="Debug">🔍</button>
    <button class="icon-btn" onclick="backToSplash()">✕</button>
  </div>
  <div id="messages">
    <div class="system-msg">🌊 Conexiune P2P directă — mesajele nu trec prin niciun server</div>
  </div>
  <div class="input-area">
    <textarea id="msgInput" placeholder="Scrie un mesaj..." rows="1"
      onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>➤</button>
  </div>
</div>

<div id="debugPanel" style="display:none;position:fixed;top:70px;left:0;right:0;bottom:60px;background:#000;color:#0f0;font-family:monospace;font-size:10px;padding:10px;overflow-y:auto;z-index:300;white-space:pre-wrap;"></div>

<div id="connectModal">
  <div class="modal-box">
    <div class="modal-title">🔗 Conectează-te</div>
    <div class="modal-sub">Introdu ID-ul persoanei (4 litere):</div>
    <input type="text" class="input-field" id="targetIdInput"
      placeholder="ex: ALFA" maxlength="4"
      oninput="this.value=this.value.toUpperCase()">
    <div id="connectStatus" style="display:none" class="waiting-indicator">
      <div class="waiting-dot"></div><div class="waiting-dot"></div><div class="waiting-dot"></div>
      <span id="connectStatusText">Se conectează...</span>
    </div>
    <div class="modal-actions">
      <button class="btn btn-ghost" onclick="closeConnectModal()">Anulează</button>
      <button class="btn btn-primary" onclick="initiateConnection()">Conectează</button>
    </div>
  </div>
</div>

<div id="status-bar">⏳ Se inițializează...</div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

const SUPABASE_URL = 'https://nkvffllrxofcusqgqzxv.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5rdmZmbGxyeG9mY3VzcWdxenh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODExMDU2MzksImV4cCI6MjA5NjY4MTYzOX0.3H8inMp5wwrK5Ufan1Ir8Urb1FU_5iK9XWXQQ_iOUm4';
const STUN = { iceServers:[
  {urls:'stun:stun.l.google.com:19302'},
  {urls:'stun:stun1.l.google.com:19302'},
  {
    urls: 'turn:openrelay.metered.ca:80',
    username: 'openrelayproject',
    credential: 'openrelayproject'
  },
  {
    urls: 'turn:openrelay.metered.ca:443',
    username: 'openrelayproject',
    credential: 'openrelayproject'
  },
  {
    urls: 'turn:openrelay.metered.ca:443?transport=tcp',
    username: 'openrelayproject',
    credential: 'openrelayproject'
  }
] };

const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);
const statusBar = document.getElementById('status-bar');

let myId = genId();
let peerId = null, pc = null, dataChannel = null, isInitiator = false;
let pendingCandidates = [];
let remoteDescSet = false;

function dbg(msg) {
  const panel = document.getElementById('debugPanel');
  const time = new Date().toLocaleTimeString('ro');
  panel.textContent += `[${time}] ${msg}\n`;
  panel.scrollTop = panel.scrollHeight;
  console.log(msg);
}
window.toggleDebug = function() {
  const p = document.getElementById('debugPanel');
  p.style.display = p.style.display === 'none' ? 'block' : 'none';
};

function genId() {
  const c='ABCDEFGHJKLMNPQRSTUVWXYZ';
  return Array.from({length:4}, ()=>c[Math.floor(Math.random()*c.length)]).join('');
}

// INIT
document.getElementById('myIdDisplay').textContent = myId;
statusBar.textContent = '🌐 Conectat — ID: ' + myId;
listenForSignals();

// SIGNALING
function listenForSignals() {
  dbg('Pornesc ascultarea pentru ID: ' + myId);
  supabase.channel('signals-' + myId)
    .on('postgres_changes', {
      event: 'INSERT', schema: 'public', table: 'signals',
      filter: 'to_peer=eq.' + myId
    }, async (payload) => {
      dbg('SEMNAL PRIMIT de la ' + payload.new.from_peer + ' tip: ' + JSON.parse(payload.new.signal_data).type);
      await handleSignal(payload.new.from_peer, JSON.parse(payload.new.signal_data));
    })
    .subscribe((status) => {
      dbg('Status subscripție: ' + status);
      if (status === 'SUBSCRIBED') {
        statusBar.textContent = '✅ Gata — ID-ul tău: ' + myId;
      } else {
        statusBar.textContent = '⏳ Stare: ' + status;
      }
    });
}

async function sendSignal(to, data) {
  dbg('Trimit semnal "' + data.type + '" catre ' + to);
  const {error} = await supabase.from('signals').insert({
    from_peer: myId, to_peer: to, signal_data: JSON.stringify(data)
  });
  if (error) dbg('EROARE trimitere: ' + JSON.stringify(error));
  else dbg('Semnal trimis OK');
}

async function cleanSignals() {
  await supabase.from('signals').delete().eq('to_peer', myId);
}

// WEBRTC
function createPC(remotePeerId) {
  pc = new RTCPeerConnection(STUN);
  dbg('PeerConnection creat (initiator=' + isInitiator + ')');
  pc.onicecandidate = async (e) => {
    if (e.candidate) {
      dbg('ICE candidate găsit (' + e.candidate.type + ')');
      await sendSignal(remotePeerId, {type:'candidate', candidate:e.candidate});
    } else {
      dbg('ICE gathering complet');
    }
  };
  pc.onconnectionstatechange = () => { dbg('connectionState: ' + pc.connectionState); updateStatus(pc.connectionState); };
  pc.oniceconnectionstatechange = () => dbg('iceConnectionState: ' + pc.iceConnectionState);
  pc.onicegatheringstatechange = () => dbg('iceGatheringState: ' + pc.iceGatheringState);
  setTimeout(() => {
    if (pc && pc.connectionState !== 'connected') {
      addSystemMsg('⚠️ Conectarea durează mult. Verifică conexiunea la internet sau încearcă din nou.');
    }
  }, 10000);
  if (isInitiator) {
    dataChannel = pc.createDataChannel('chat', {ordered:true});
    setupChannel(dataChannel);
  } else {
    pc.ondatachannel = (e) => { dataChannel = e.channel; setupChannel(dataChannel); };
  }
}

function setupChannel(ch) {
  ch.onopen = () => {
    updateStatus('connected');
    document.getElementById('sendBtn').disabled = false;
    addSystemMsg('✅ Conectat P2P direct! Mesajele zboară prin oceanul de energie 🌊');
    cleanSignals();
  };
  ch.onclose = () => {
    updateStatus('disconnected');
    document.getElementById('sendBtn').disabled = true;
    addSystemMsg('🔌 Conexiunea s-a închis.');
  };
  ch.onmessage = (e) => addMessage(e.data, false);
}

async function handleSignal(fromPeer, signal) {
  if (signal.type === 'offer') {
    peerId = fromPeer; isInitiator = false;
    pendingCandidates = []; remoteDescSet = false;
    setPeerInfo(fromPeer); showApp();
    createPC(fromPeer);
    await pc.setRemoteDescription(new RTCSessionDescription(signal.sdp));
    remoteDescSet = true;
    await flushCandidates();
    const answer = await pc.createAnswer();
    await pc.setLocalDescription(answer);
    await sendSignal(fromPeer, {type:'answer', sdp:pc.localDescription});
  } else if (signal.type === 'answer') {
    if (pc && pc.signalingState !== 'stable') {
      await pc.setRemoteDescription(new RTCSessionDescription(signal.sdp));
      remoteDescSet = true;
      await flushCandidates();
    }
  } else if (signal.type === 'candidate') {
    if (remoteDescSet && pc) {
      try { await pc.addIceCandidate(new RTCIceCandidate(signal.candidate)); } catch(e){ console.warn('ICE add error', e); }
    } else {
      pendingCandidates.push(signal.candidate);
    }
  }
}

async function flushCandidates() {
  for (const c of pendingCandidates) {
    try { await pc.addIceCandidate(new RTCIceCandidate(c)); } catch(e){ console.warn('ICE flush error', e); }
  }
  pendingCandidates = [];
}

// MESSAGES
window.sendMessage = function() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || !dataChannel || dataChannel.readyState !== 'open') return;
  dataChannel.send(text);
  addMessage(text, true);
  input.value = ''; input.style.height = 'auto';
};

function addMessage(text, isMine) {
  const msgs = document.getElementById('messages');
  const now = new Date().toLocaleTimeString('ro',{hour:'2-digit',minute:'2-digit'});
  const row = document.createElement('div');
  row.className = 'msg-row ' + (isMine ? 'mine' : 'theirs');
  row.innerHTML = `<div style="display:flex;flex-direction:column;align-items:${isMine?'flex-end':'flex-start'}">
    <div class="msg-time">${now}</div>
    <div class="msg-bubble">${esc(text)}</div></div>`;
  msgs.appendChild(row);
  msgs.scrollTop = msgs.scrollHeight;
}

function addSystemMsg(text) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'system-msg'; div.textContent = text;
  msgs.appendChild(div); msgs.scrollTop = msgs.scrollHeight;
}

function esc(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// UI
window.initiateConnection = async function() {
  const input = document.getElementById('targetIdInput').value.trim().toUpperCase();
  if (input.length !== 4 || input === myId) {
    document.getElementById('targetIdInput').style.borderColor = 'var(--danger)'; return;
  }
  peerId = input; isInitiator = true;
  pendingCandidates = []; remoteDescSet = false;
  showConnectStatus('Trimit invitație...');
  createPC(peerId);
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  await sendSignal(peerId, {type:'offer', sdp:pc.localDescription});
  showConnectStatus('Aștept răspuns...');
  setPeerInfo(peerId); showApp(); closeConnectModal();
};

window.openConnectModal = () => document.getElementById('connectModal').classList.add('visible');
window.closeConnectModal = () => {
  document.getElementById('connectModal').classList.remove('visible');
  document.getElementById('connectStatus').style.display = 'none';
  document.getElementById('targetIdInput').value = '';
  document.getElementById('targetIdInput').style.borderColor = '';
};
window.showWaiting = () => { addSystemMsg('⏳ Aștept conexiune... ID: ' + myId); showApp(); };
window.backToSplash = () => {
  if (pc) { pc.close(); pc = null; }
  if (dataChannel) { dataChannel.close(); dataChannel = null; }
  peerId = null; isInitiator = false;
  document.getElementById('messages').innerHTML = '<div class="system-msg">🌊 Conexiune P2P directă — mesajele nu trec prin niciun server</div>';
  document.getElementById('sendBtn').disabled = true;
  document.getElementById('app').classList.remove('visible');
  document.getElementById('splash').classList.remove('hidden');
};
window.handleKey = (e) => { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); window.sendMessage(); } };
window.autoResize = (el) => { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; };

function showApp() {
  document.getElementById('splash').classList.add('hidden');
  document.getElementById('app').classList.add('visible');
}
function setPeerInfo(id) {
  document.getElementById('peerAvatar').textContent = id[0];
  document.getElementById('peerName').textContent = 'Peer ' + id;
}
function showConnectStatus(text) {
  document.getElementById('connectStatus').style.display = 'flex';
  document.getElementById('connectStatusText').textContent = text;
}
function updateStatus(state) {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  const map = {connected:{label:'Conectat P2P direct',online:true},connecting:{label:'Se conectează...',online:false},disconnected:{label:'Deconectat',online:false},failed:{label:'Eșuat',online:false}};
  const s = map[state] || {label:state, online:false};
  text.textContent = s.label;
  dot.className = 'status-dot' + (s.online?' online':'');
}
</script>
</body>
</html>
